name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api-tests:
    name: API tests (pytest)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: crawliq
          POSTGRES_PASSWORD: crawliq
          POSTGRES_DB: crawliq
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U crawliq -d crawliq"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10

    env:
      CRAWLIQ_TEST_DATABASE_URL: postgresql://crawliq:crawliq@localhost:5432/crawliq
      DATABASE_URL: postgresql://crawliq:crawliq@localhost:5432/crawliq
      REDIS_URL: redis://localhost:6379/0

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            apps/api/requirements.txt
            apps/api/requirements-dev.txt
            apps/worker/requirements.txt
            packages/crawliq_core/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements-dev.txt

      - name: Run database migrations
        env:
          PYTHONPATH: apps/api:packages
        working-directory: apps/api
        run: |
          alembic upgrade head

      - name: Run API tests
        env:
          PYTHONPATH: apps/api:packages
        run: |
          set -o pipefail
          pytest apps/api -v --tb=short 2>&1 | tee pytest-output.txt

      - name: Fail if tests were skipped
        run: |
          if grep -q " skipped" pytest-output.txt; then
            echo "::error::Tests were skipped! This likely means CRAWLIQ_TEST_DATABASE_URL is not set correctly."
            exit 1
          fi
          echo "All tests ran (no skips)"

  worker-tests:
    name: Worker tests (pytest)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: crawliq
          POSTGRES_PASSWORD: crawliq
          POSTGRES_DB: crawliq
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U crawliq -d crawliq"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10

    env:
      CRAWLIQ_TEST_DATABASE_URL: postgresql://crawliq:crawliq@localhost:5432/crawliq
      DATABASE_URL: postgresql://crawliq:crawliq@localhost:5432/crawliq
      REDIS_URL: redis://localhost:6379/0

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            apps/api/requirements.txt
            apps/api/requirements-dev.txt
            apps/worker/requirements.txt
            packages/crawliq_core/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements-dev.txt

      - name: Run database migrations
        env:
          PYTHONPATH: apps/api:packages
        working-directory: apps/api
        run: |
          alembic upgrade head

      - name: Run worker tests
        env:
          PYTHONPATH: apps/api:apps/worker:packages
        run: |
          pytest apps/worker -v --tb=short

  web-typecheck:
    name: Web typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck
