services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: crawliq
      POSTGRES_PASSWORD: crawliq
      POSTGRES_DB: crawliq
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crawliq -d crawliq"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}
        PIP_EXTRA_TRUSTED_HOST: ${PIP_EXTRA_TRUSTED_HOST:-}
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://crawliq:crawliq@postgres:5432/crawliq}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CRAWL_DEFAULT_MAX_PAGES: ${CRAWL_DEFAULT_MAX_PAGES:-100}
      CRAWL_DEFAULT_MAX_DEPTH: ${CRAWL_DEFAULT_MAX_DEPTH:-2}
      CRAWL_REQUEST_TIMEOUT_SECONDS: ${CRAWL_REQUEST_TIMEOUT_SECONDS:-10}
      CRAWL_DOMAIN_DELAY_SECONDS: ${CRAWL_DOMAIN_DELAY_SECONDS:-1}
      CRAWL_JOB_TIMEOUT_SECONDS: ${CRAWL_JOB_TIMEOUT_SECONDS:-3600}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}
        PIP_EXTRA_TRUSTED_HOST: ${PIP_EXTRA_TRUSTED_HOST:-}
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://crawliq:crawliq@postgres:5432/crawliq}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CRAWL_DEFAULT_MAX_PAGES: ${CRAWL_DEFAULT_MAX_PAGES:-100}
      CRAWL_DEFAULT_MAX_DEPTH: ${CRAWL_DEFAULT_MAX_DEPTH:-2}
      CRAWL_REQUEST_TIMEOUT_SECONDS: ${CRAWL_REQUEST_TIMEOUT_SECONDS:-10}
      CRAWL_DOMAIN_DELAY_SECONDS: ${CRAWL_DOMAIN_DELAY_SECONDS:-1}
      CRAWL_JOB_TIMEOUT_SECONDS: ${CRAWL_JOB_TIMEOUT_SECONDS:-3600}
    # Give workers time to mark jobs as failed on shutdown
    stop_grace_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  demo-site:
    image: nginx:1.27-alpine
    ports:
      - "${DEMO_SITE_PORT:-8081}:80"
    volumes:
      - ./demo-site:/usr/share/nginx/html:ro

  web:
    build:
      context: ./apps/web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NPM_CONFIG_REGISTRY: ${NPM_CONFIG_REGISTRY:-https://registry.npmjs.org/}
        NPM_STRICT_SSL: ${NPM_STRICT_SSL:-true}
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      API_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy

  # Local UI dev without Windows npm/OpenSSL (ERR_SSL_CIPHER_OPERATION_FAILED).
  # Linux installs deps + correct SWC; node_modules live in a named volume.
  # Only starts with: docker compose --profile dev up web-dev
  web-dev:
    profiles: ["dev"]
    image: node:20-bookworm-slim
    working_dir: /app
    ports:
      - "${WEB_DEV_PORT:-3000}:3000"
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      WATCHPACK_POLLING: "true"
    volumes:
      - ./apps/web:/app
      - web_dev_node_modules:/app/node_modules
    command:
      [
        "sh",
        "-c",
        "npm install && exec npm run dev -- -H 0.0.0.0 -p 3000",
      ]

# Optional named volumes for persistence.
volumes:
  postgres_data:
    # Pin the actual Docker volume name so the DB persists even if the
    # Compose "project name" changes (Docker Desktop vs CLI, different folders, etc.).
    # Set POSTGRES_VOLUME_NAME to reuse an existing volume (e.g. an older stack).
    name: ${POSTGRES_VOLUME_NAME:-crawliq_postgres_data}
  web_dev_node_modules:
